<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9A8BFF"/>
      <stop offset="1" stop-color="#6A45FF"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#sheen)"/>
  <!-- vitality pulse mark -->
  <polyline points="78,272 168,272 210,176 260,344 300,256 332,256 360,232 434,232"
    fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="434" cy="232" r="17" fill="#ffffff" filter="url(#glow)"/>
</svg>
