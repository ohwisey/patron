<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9A8BFF"/>
      <stop offset="1" stop-color="#6A45FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- full-bleed (no rounded corners) so platform masking + iOS corner-rounding look right -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- mark kept within the central ~60% maskable safe zone -->
  <polyline points="146,276 196,276 224,212 268,328 296,256 316,256 336,242 372,242"
    fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="372" cy="242" r="14" fill="#ffffff" filter="url(#glow)"/>
</svg>
